<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fairy Kingdom Count Quest</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #1a0a2e;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* The custom wand cursor replaces the OS cursor on the game canvas. */
    #game-container, #game-container canvas {
      cursor: none;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- Phaser 3 (latest stable) and Howler.js via CDN — no build step required. -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>

  <!-- Game entry point (ES6 modules — requires http://localhost or https, not file://). -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
